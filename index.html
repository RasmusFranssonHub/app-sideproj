<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundRev</title>
  </head>
  <body>
    <div id="app">
    <header>
      <div class="nav-bar-head">
        <h1>SoundRev.</h1>
        <nav class="header-nav">
          <ul>
            <li><a href="/uploads">Uploads</a></li>
            <li><a href="/in-progress">In progress</a></li>
            <li><a href="/completed">Completed</a></li>
            <li><a href="/login">Login</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>

      <!-- UPLOAD -->
      <section class="player-style">
        <label for="upload">Upload your audio file:</label>
        <input type="file" id="upload" accept="audio/*" />
      </section>

      <section id="player" class="hidden">

        <!-- All pieces stack as siblings inside player-block -->
        <div class="player-block">

          <!-- 1. TOP CARD: name + waveform + transport -->
          <div class="player-card">

            <button id="delete-project-btn" class="delete-project-btn" title="Delete project">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>

            <!-- Project name + edit button -->

            <div id="project-name" class="project-name hidden">
              <div class="project-name-row">
                <input id="project-name-input" class="project-name-input" type="text" placeholder="PROJECT NAME" spellcheck="false" />
                <button id="project-name-edit" class="project-name-edit-btn" title="Rename">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="timeline-row">
              <span id="current-time" class="time-display">0:00</span>
              <div id="timeline">
                <canvas id="waveform" width="1200" height="96"></canvas>
                <div id="playhead-handle"></div>
              </div>
              <span id="duration" class="time-display">0:00</span>
            </div>

            <div class="transport">
              <button id="rewind" class="transport-btn" title="Restart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="19 20 9 12 19 4 19 20"/>
                  <line x1="5" y1="4" x2="5" y2="20"/>
                </svg>
              </button>
              <button id="play-pause" class="transport-btn play-pause-btn" title="Play / Pause">
                <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
                  <rect x="6" y="4" width="4" height="16"/>
                  <rect x="14" y="4" width="4" height="16"/>
                </svg>
              </button>
              <button id="fast-forward" class="transport-btn" title="End">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="5 4 15 12 5 20 5 4"/>
                  <line x1="19" y1="4" x2="19" y2="20"/>
                </svg>
              </button>
            </div>

          </div><!-- /.player-card -->

          <!-- 2. COMMENT SECTION: button + popup as one block -->
          <div class="comment-section">

            <button id="comment-btn" class="comment-trigger-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              <span id="comment-btn-label">Comment</span>
            </button>

            <div id="comment-popup" class="comment-popup">
              <div class="comment-popup-header">
                <span id="comment-popup-title">Add comment</span>
                <div class="comment-timestamp-row">
                  <label for="comment-timestamp">Timestamp</label>
                  <input id="comment-timestamp" class="comment-timestamp-input" type="text" value="0:00" spellcheck="false" />
                </div>
              </div>
              <textarea id="comment-text" placeholder="Write your comment..."></textarea>
              <div class="comment-popup-footer">
                <div class="comment-options">
                  <label for="comment-type">Type</label>
                  <select id="comment-type">
                    <option value="general">General</option>
                    <option value="mix">Mix</option>
                    <option value="timing">Timing</option>
                    <option value="arrangement">Arrangement</option>
                  </select>
                  <label for="comment-color">Color</label>
                  <input type="color" id="comment-color" value="#ff0000" />
                </div>
                <div class="comment-popup-actions">
                  <button id="comment-delete" class="btn-delete">Delete</button>
                  <button id="comment-cancel" class="btn-cancel">Cancel</button>
                  <button id="save-comment" class="btn-save">Save</button>
                </div>
              </div>
            </div>

          </div><!-- /.comment-section -->

          <!-- 3. COMMENTS LIST -->
          <div id="comments-panel" class="hidden">
            <ul id="comments-list"></ul>
          </div>
          <div class="action-bar">
            <button id="action-save" class="action-btn action-btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Save to uploads
            </button>
            <button id="action-workspace" class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
              Open in workspace
            </button>
            <button id="action-share" class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
              Share track
            </button>
          </div>
        </div><!-- /.player-block -->
      </section>

    </main>

    <!-- DELETE MODAL -->
    <div id="delete-modal" class="modal-overlay hidden">
      <div class="modal">
        <p class="modal-text">Are you sure you want to delete this project?</p>
        <div class="modal-actions">
          <button id="modal-save" class="btn-save">Save project</button>
          <button id="modal-confirm-delete" class="btn-delete">Delete</button>
          <button id="modal-cancel" class="btn-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2024 SoundRev. All rights reserved.</p>
    </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

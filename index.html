<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundRev</title>
  </head>
  <body>
    <div id="app">

      <header>
        <div class="nav-bar-head">
          <a href="/app-sideproj/" class="nav-logo"><h1>SoundRev.</h1></a>
          <nav class="header-nav">
            <ul>
              <li><a href="/app-sideproj/">+ New track</a></li>
              <li><a href="/app-sideproj/uploads.html">Uploads</a></li>
              <li><a href="/app-sideproj/workspace.html">Workspace</a></li>
              <li><a href="/app-sideproj/login.html">Login</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main>

        <!-- UPLOAD -->
        <section class="player-style">
          <label for="upload">Upload your audio file:</label>
          <input type="file" id="upload" accept=".mp3,.wav,.aac,.m4a,.ogg,.opus,.flac,.aiff,.aif,.wma,.mp4a,audio/mpeg,audio/wav,audio/wave,audio/x-wav,audio/aac,audio/mp4,audio/x-m4a,audio/ogg,audio/opus,audio/flac,audio/x-flac,audio/aiff,audio/x-aiff,audio/x-ms-wma" />
        </section>

        <!-- PLAYER -->
        <section id="player" class="hidden">

          <!-- Project name -->
          <div id="project-name" class="project-name hidden">
            <div class="project-name-row">
              <input id="project-name-input" class="project-name-input" type="text" placeholder="Project name" spellcheck="false" />
              <button class="project-name-edit-btn" id="project-name-edit" aria-label="Edit name">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Player card -->
          <div class="player-block">
            <div class="player-card">

              <div class="timeline-row">
                <div class="time-display"><span id="current-time">0:00</span></div>
                <div class="timeline-wrapper">
                  <div id="timeline">
                    <canvas id="waveform" width="800" height="100"></canvas>
                    <canvas id="playhead" width="800" height="100"></canvas>
                    <div id="playhead-handle"></div>
                  </div>
                  <div id="timeline-dots" class="timeline-dots"></div>
                </div>
                <div class="time-display"><span id="duration">0:00</span></div>
              </div>

              <div class="transport">
                <button id="rewind" class="transport-btn" aria-label="Rewind">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
                </button>
                <button id="play-pause" class="transport-btn play-pause-btn" aria-label="Play / Pause">
                  <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button id="fast-forward" class="transport-btn" aria-label="Fast forward">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
                </button>
              </div>
<!-- Comment creator -->
              <div class="comment-section">
                <button class="comment-trigger-btn" id="comment-btn" aria-label="Add comment">
                  Comment
                  <svg class="trigger-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
        
              </div>

            </div>
          </div>

          <!-- Comments panel — separate card -->
          <div id="comments-panel" class="hidden">
            <div class="comments-panel-header" id="comments-panel-header">
              <span class="comments-panel-title">
                Comments
                <span class="comments-panel-count" id="comments-count">0</span>
              </span>
              <button class="comments-panel-toggle" id="comments-panel-toggle" aria-label="Toggle comments">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="18 15 12 9 6 15"/>
                </svg>
              </button>
            </div>
            <div id="comments-list-wrapper">
              <ul id="comments-list"></ul>
            </div>
          </div>

          <!-- Action bar — desktop: below comments -->
          <div class="action-bar-wrapper" id="action-bar">
            <div class="action-bar-frame">
              <button id="action-delete" class="action-btn action-btn--delete">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Delete project
              </button>
              <button id="action-save" class="action-btn action-btn--save">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save project
              </button>
            </div>
          </div>

        </section>

      </main>

      <!-- SAVE POPUP -->
      <div id="save-popup" class="fullscreen-popup hidden">
        <div class="fullscreen-popup-backdrop"></div>
        <div class="fullscreen-popup-sheet">
          <div class="fullscreen-popup-handle"></div>
          <button id="save-popup-close" class="fullscreen-popup-close" aria-label="Close">✕</button>
          <h2 class="fullscreen-popup-title">Save project</h2>
          <p class="fullscreen-popup-sub">Choose what to do next</p>
          <div class="fullscreen-popup-options">
            <button id="save-popup-uploads" class="popup-option">
              <div class="popup-option-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              </div>
              <div class="popup-option-text">
                <span class="popup-option-title">Save to uploads</span>
                <span class="popup-option-desc">Store in your account</span>
              </div>
              <svg class="popup-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button id="save-popup-share" class="popup-option">
              <div class="popup-option-icon popup-option-icon--share">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              </div>
              <div class="popup-option-text">
                <span class="popup-option-title">Share project</span>
                <span class="popup-option-desc">Send to a collaborator</span>
              </div>
              <svg class="popup-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- SHARE POPUP -->
      <div id="share-popup" class="fullscreen-popup hidden">
        <div class="fullscreen-popup-backdrop"></div>
        <div class="fullscreen-popup-sheet">
          <div class="fullscreen-popup-handle"></div>
          <button id="share-popup-close" class="fullscreen-popup-close" aria-label="Close">✕</button>
          <h2 class="fullscreen-popup-title">Share project</h2>
          <p class="fullscreen-popup-sub">Send your commented track</p>
          <div class="fullscreen-popup-options" id="share-options"></div>
        </div>
      </div>

      <!-- DELETE POPUP -->
      <div id="delete-popup" class="fullscreen-popup hidden">
        <div class="fullscreen-popup-backdrop"></div>
        <div class="fullscreen-popup-sheet">
          <div class="fullscreen-popup-handle"></div>
          <button id="delete-popup-close" class="fullscreen-popup-close" aria-label="Close">✕</button>
          <h2 class="fullscreen-popup-title fullscreen-popup-title--danger">Delete project?</h2>
          <p class="fullscreen-popup-sub">This cannot be undone</p>
          <div class="fullscreen-popup-options">
            <button id="delete-popup-save-first" class="popup-option">
              <div class="popup-option-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              </div>
              <div class="popup-option-text">
                <span class="popup-option-title">Save first, then delete</span>
                <span class="popup-option-desc">Export a backup before removing</span>
              </div>
              <svg class="popup-option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button id="delete-popup-confirm" class="popup-option popup-option--danger">
              <div class="popup-option-icon popup-option-icon--danger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </div>
              <div class="popup-option-text">
                <span class="popup-option-title">Delete permanently</span>
                <span class="popup-option-desc">Remove project and all comments</span>
              </div>
            </button>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  <!--COMMENT POPUP - fullscreen sheet on mobile -->
  <div id="comment-popup" class="comment-popup hidden">
    <div class="comment-popup-backdrop" onclick="document.getElementById('comment-cancel')?.click()"></div>
    <div class="comment-popup-inner">
      <div class="comment-popup-header">
        <span>Add comment</span>
        <input class="comment-timestamp-input" id="comment-timestamp" type="text" value="0:00" />
      </div>
      <textarea id="comment-text" placeholder="Write your comment..."></textarea>
      <div class="comment-popup-footer">
        <div class="comment-options">
          <label for="comment-type">Type:</label>
          <select id="comment-type">
            <option value="general">General</option>
            <option value="mix">Mix</option>
            <option value="timing">Timing</option>
            <option value="arrangement">Arrangement</option>
          </select>
          <div class="color-picker-row" id="color-swatches"></div>
        </div>
        <div class="comment-popup-actions">
          <button class="btn-cancel" id="comment-cancel">Cancel</button>
          <button class="btn-save" id="save-comment">Save</button>
        </div>
      </div>
    </div>
  </div>
  </body>
</html>

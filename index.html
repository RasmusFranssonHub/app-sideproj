<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundRev</title>
  </head>
  <body>
    <div id="app">
      <header>
      <div class="nav-bar-head">
        <h1>SoundRev.</h1> 
        <nav class="header-nav">
          <ul>
            <li><a href="/uploads">Uploads</a></li>
            <li><a href="/in-progress">In progress</a></li>
            <li><a href="/completed">Completed</a></li>
            <li><a href="/login">Login</a></li>
          </ul>
        </nav>
      </div>
      </header>

      <main>
        <!-- The main content of the application will be rendered here by React. -->

        <!----------------------- UPLOAD FILE -------------------------->
        <section class="player-style">
          <label for="upload">Upload your audio file:</label>
          <input type="file" id="upload" accept="audio/*" />
        </section>

          <!-------------------------- PLAYER -------------------------->
          <section id="player" class="hidden">

            <!----------------------- WAVEFORM -------------------------->
            <div id="timeline">
              <canvas id="waveform" width="800" height="100"></canvas>
              <canvas id="playhead" width="800" height="100"></canvas>
            </div>
            <!----------------------- CONTROLS -------------------------->
              <div class="play-pause-controls">
                <button id="rewind">Rewind</button>
                
                <div class="play-pause">
                  <button id="pause">Pause</button>
                  <button id="play">Play</button>
                </div>
                
                <button id="fast-forward">Fast Forward</button>
              </div>

            
              <!---------------------- TIME------------------------------->
              <div class="current-time-display">
                Time: <span id="current-time">0:00</span>
              </div>

              <div class="duration-display">
                Duration: <span id="duration">0:00</span>
              </div>

                <div class="playback-speed-control">
                  <label for="playback-speed">Speed:</label>
                  <select id="playback-speed">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                  </select>
                </div>
          </section>

          <!------------------------- COMMENTS -------------------------->
          <section id="comments-panel">
            <h3>Comments</h3>
            <ul id="comments-list"></ul>
          </section>
      </main>

      <!--COMMENTS POPUP-->
        <div id="comment-popup" class="comment-popup hidden">

          <h3>Add comment</h3>

          <textarea 
            id="comment-text"
            placeholder="Write your comment..."
            ></textarea>

          <div class="comment-options">
            <label for="comment-type">Type:</label>
            <select id="comment-type">
              <option value="general">General</option>
              <option value="mix">Mix</option>
              <option value="timing">Timing</option>
              <option value="arrangement">Arrangement</option>
            </select>

            <label for="comment-color">Color:</label>
            <input type="color" id="comment-color" value="#ff0000" />

          </div>

          <button id="save-comment">Save comment</button>

        </div>
      <!------------------------- FOOTER -------------------------->

      <footer>
        <p>&copy; 2024 SoundRev. All rights reserved.</p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
    
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundRev — Uploads</title>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="nav-bar-head">
          <a href="/app-sideproj/" class="nav-logo"><h1>SoundRev.</h1></a>
          <nav class="header-nav">
            <ul>
              <li><a href="/app-sideproj/">+ New track</a></li>
              <li><a href="/app-sideproj/uploads.html" class="nav-active">Uploads</a></li>
              <li><a href="/app-sideproj/workspace.html">Workspace</a></li>
              <li><a href="/app-sideproj/login.html">Login</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="uploads-main">

        <div id="uploads-header" class="uploads-header">
          <h2 class="uploads-title">Uploads</h2>
          <a href="/app-sideproj/" class="btn-new-upload">+ New upload</a>
        </div>

        <div id="uploads-empty" class="uploads-empty hidden">
          <p>No saved projects yet. <a href="/app-sideproj/">Upload your first track →</a></p>
        </div>

        <!-- LIST VIEW -->
        <ul id="uploads-list" class="uploads-list"></ul>

        <!-- PROJECT VIEW — shown when a project is opened -->
        <div id="project-view" class="project-view hidden">
          <button id="project-view-back" class="project-view-back">← Back</button>

          <div class="project-view-card">
            <div class="project-view-header">
              <h2 id="project-view-name" class="project-view-name"></h2>
              <span id="project-view-file" class="project-view-file"></span>
            </div>

            <!-- Mini waveform placeholder with comment markers -->
            <div class="project-view-waveform">
              <canvas id="project-view-canvas" height="60"></canvas>
              <div id="project-view-markers" class="project-view-markers"></div>
            </div>

            <div class="project-view-meta">
              <span id="project-view-duration"></span>
              <span id="project-view-date"></span>
              <span id="project-view-count"></span>
            </div>

            <!-- Comments read-only list -->
            <ul id="project-view-comments" class="project-view-comments"></ul>

            <!-- Actions -->
            <div class="project-view-actions">
              <button id="project-view-open" class="upload-btn-open">Open & edit</button>
              <button id="project-view-export" class="upload-btn-export">Export JSON</button>
            </div>
          </div>
        </div>

      </main>

      <footer>
        <p>&copy; 2024 SoundRev. All rights reserved.</p>
      </footer>
    </div>
    <script type="module" src="/src/uploads-page.ts"></script>
  </body>
</html>
